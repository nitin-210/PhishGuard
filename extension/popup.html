<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  body { width: 280px; margin: 0; font-family: -apple-system, Segoe UI, Roboto, Arial, sans-serif;
         color: #0f2742; padding: 14px; }
  h1 { font-size: 15px; margin: 0 0 4px; }
  p { font-size: 12px; color: #5b6b7b; margin: 0 0 12px; line-height: 1.4; }
  label { font-size: 12px; font-weight: 600; display: block; margin-bottom: 4px; }
  input { width: 100%; box-sizing: border-box; padding: 8px 10px; border: 1px solid #e2e8f0;
          border-radius: 8px; font-size: 13px; }
  button { width: 100%; margin-top: 10px; border: none; border-radius: 8px; background: #1f6feb;
           color: #fff; font-weight: 600; font-size: 13px; padding: 9px; cursor: pointer; }
  .ok { color: #15803d; font-size: 12px; margin-top: 8px; display: none; }
</style>
</head>
<body>
  <h1>🛡️ PhishGuard</h1>
  <p>Open an email in Gmail or Outlook, then click the "Check email" button in the corner of the page.</p>
  <label for="backend">Backend URL</label>
  <input id="backend" placeholder="http://127.0.0.1:8000">
  <button id="save">Save</button>
  <div class="ok" id="ok">Saved ✓</div>
  <script src="popup.js"></script>
</body>
</html>
